<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浦安ご当地めいすいくん人気投票選挙</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">

  <!-- デザインシステム -->
  <link rel="stylesheet" href="css/design-system.css">

  <!-- キャラクターデータ（画像含む） -->
  <script src="js/config.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    /* ============================================
       display.html 専用スタイル
       55インチモニター向け シネマティックUI
       ============================================ */

    /* --- リセット・ベース --- */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-sans);
      color: var(--color-text-light);
      position: relative;
      background: #0F0F23;
    }

    /* --- アニメーション背景（深い紺〜紫グラデーション） --- */
    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(
        135deg,
        #0F0F23 0%,
        #1B1040 20%,
        #0F1B3E 40%,
        #251050 60%,
        #0F1628 80%,
        #1B0A30 100%
      );
      background-size: 400% 400%;
      animation: bg-shift 30s ease-in-out infinite;
    }

    @keyframes bg-shift {
      0%   { background-position: 0% 50%; }
      25%  { background-position: 100% 0%; }
      50%  { background-position: 100% 100%; }
      75%  { background-position: 0% 100%; }
      100% { background-position: 0% 50%; }
    }

    /* 背景オーバーレイ（放射状の光） */
    .bg-radial {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 50%, rgba(99, 102, 241, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 40%, rgba(168, 85, 247, 0.10) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 50% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    /* パーティクル格納 */
    .particle-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    /* 桜の花びら */
    .particle { position: absolute; pointer-events: none; }

    .blossom {
      animation: blossom-fall linear infinite;
      will-change: transform;
    }

    @keyframes blossom-fall {
      0% {
        transform: translateY(-5vh) rotate(0deg) translateX(0);
        opacity: 0.9;
      }
      25% { transform: translateY(25vh) rotate(90deg) translateX(30px); }
      50% { transform: translateY(50vh) rotate(180deg) translateX(-20px); }
      75% { transform: translateY(75vh) rotate(270deg) translateX(25px); }
      100% {
        transform: translateY(105vh) rotate(360deg) translateX(-10px);
        opacity: 0;
      }
    }

    /* --- メインレイアウト --- */
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
    }

    /* --- タイトルバー（グラスモーフィズム） --- */
    .title-bar {
      position: relative;
      background: rgba(15, 15, 40, 0.6);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 18px 60px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }

    .title-bar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(202, 138, 4, 0.4), rgba(255, 215, 0, 0.3), rgba(202, 138, 4, 0.4), transparent);
    }

    .title-icon {
      font-size: 2.2em;
      filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.4));
    }

    .title-text {
      font-family: var(--font-serif);
      font-size: 2.4em;
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #e0e7ff, #ffffff, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 2px 8px rgba(99, 102, 241, 0.3));
    }

    /* --- コンテンツ（左70% + 右30%） --- */
    .content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* --- 左パネル：キャラクターワールド --- */
    .world-map {
      width: 70%;
      position: relative;
      overflow: hidden;
    }

    /* 左パネル背景グロー */
    .world-map::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(99, 102, 241, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .character-world {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* キャラクターアイコン（実画像版） */
    .character-icon {
      position: absolute;
      cursor: default;
      z-index: 3;
      transition: transform var(--duration-slow) var(--ease-spring);
      animation: char-float 6s ease-in-out infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* キャラクター画像 */
    .character-icon .char-img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.4));
      pointer-events: none;
    }

    /* キャラ名ラベル */
    .character-icon .char-label {
      margin-top: 8px;
      font-size: 0.95em;
      font-family: var(--font-sans);
      font-weight: 700;
      white-space: nowrap;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      letter-spacing: 0.04em;
    }

    /* キャラグロー（キャラカラーは JS で設定） */
    .character-icon .char-glow {
      position: absolute;
      top: 40%;
      left: 50%;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      filter: blur(40px);
      opacity: 0.4;
      z-index: -1;
      animation: glow-pulse 4s ease-in-out infinite;
    }

    /* ランキング内のキャラ画像サムネイル */
    .rank-thumb {
      width: 40px;
      height: 40px;
      object-fit: contain;
      margin-right: 10px;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }

    @keyframes char-float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-22px); }
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.55; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* 投票パーティクル */
    .vote-particle {
      position: absolute;
      pointer-events: none;
      font-size: 1.6em;
      z-index: 10;
      animation: vote-burst 1.2s var(--ease-spring-bouncy) forwards;
    }

    @keyframes vote-burst {
      0% { transform: scale(0.5) translateY(0); opacity: 1; }
      100% { transform: scale(1.5) translateY(-80px); opacity: 0; }
    }

    /* --- 右パネル（グラスモーフィズム） --- */
    .results-panel {
      width: 30%;
      background: rgba(12, 12, 30, 0.6);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      padding: 24px 22px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* スクロールバー（暗色） */
    .results-panel::-webkit-scrollbar { width: 6px; }
    .results-panel::-webkit-scrollbar-track { background: transparent; }
    .results-panel::-webkit-scrollbar-thumb {
      background: rgba(168, 85, 247, 0.3);
      border-radius: var(--radius-full);
    }

    /* --- セクションタイトル --- */
    .section-title {
      font-family: var(--font-serif);
      font-size: 1.4em;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      letter-spacing: 0.04em;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
    }

    /* --- ランキングアイテム --- */
    .ranking-item {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.35s var(--ease-spring-gentle);
      position: relative;
      overflow: hidden;
    }

    .ranking-item::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.35s;
    }

    .ranking-item:nth-child(1) {
      background: rgba(255, 215, 0, 0.08);
      border-color: rgba(255, 215, 0, 0.15);
    }

    .ranking-item:nth-child(2) {
      background: rgba(192, 192, 192, 0.06);
      border-color: rgba(192, 192, 192, 0.12);
    }

    .ranking-item:nth-child(3) {
      background: rgba(205, 127, 50, 0.06);
      border-color: rgba(205, 127, 50, 0.12);
    }

    /* 投票フラッシュアニメーション */
    .ranking-item.voted {
      animation: rank-flash 0.7s var(--ease-spring-bouncy);
    }

    @keyframes rank-flash {
      0% {
        background: rgba(168, 85, 247, 0.25);
        transform: scale(1.03);
        box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
      }
      100% {
        transform: scale(1);
        box-shadow: none;
      }
    }

    .ranking-left {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 0;
    }

    .rank-medal {
      font-size: 2em;
      margin-right: 12px;
      width: 52px;
      text-align: center;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
    }

    /* 1位のメダルは輝きアニメーション */
    .ranking-item:first-child .rank-medal {
      animation: medal-shine 3s ease-in-out infinite;
    }

    @keyframes medal-shine {
      0%, 100% { filter: drop-shadow(0 2px 6px rgba(255, 215, 0, 0.4)); }
      50% { filter: drop-shadow(0 2px 16px rgba(255, 215, 0, 0.8)) brightness(1.1); }
    }

    .rank-name {
      font-size: 1em;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.88);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rank-count {
      font-size: 1.35em;
      font-weight: 900;
      min-width: 48px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #c4b5fd, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .ranking-item:first-child .rank-count {
      background: linear-gradient(135deg, #ffd700, #ffed4e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* --- 棒グラフ --- */
    .bar-chart {
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .bar-item { margin-bottom: 10px; }
    .bar-item:last-child { margin-bottom: 0; }

    .bar-label {
      font-size: 0.82em;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .bar-label-percent {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .bar {
      width: 100%;
      height: 22px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-full);
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: var(--radius-full);
      transition: width 0.6s var(--ease-out);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      color: rgba(255, 255, 255, 0.95);
      font-size: 0.72em;
      font-weight: 700;
      position: relative;
      overflow: hidden;
    }

    /* バーの輝きエフェクト */
    .bar-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      animation: bar-shimmer 3s ease-in-out infinite;
    }

    @keyframes bar-shimmer {
      0% { left: -50%; }
      100% { left: 150%; }
    }

    /* キャラクター別カラー（グラデーション） */
    .bar-fill.meisui      { background: linear-gradient(90deg, #b8960a, #ffd700, #ffed4e); }
    .bar-fill.tsutsuji    { background: linear-gradient(90deg, #9c27b0, #e040fb, #f48fb1); }
    .bar-fill.meisui_chan  { background: linear-gradient(90deg, #c62828, #ff6b6b, #ff8a80); }
    .bar-fill.bekabune    { background: linear-gradient(90deg, #1565c0, #42a5f5, #90caf9); }
    .bar-fill.asari       { background: linear-gradient(90deg, #d84315, #ff8a65, #ffccbc); }
    .bar-fill.ryoushi     { background: linear-gradient(90deg, #2e7d32, #66bb6a, #a5d6a7); }

    /* --- 統計セクション --- */
    .stats-section {
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .stat-row:last-child { margin-bottom: 0; }

    .stat-label {
      font-size: 0.9em;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
    }

    .stat-value {
      font-size: 1.8em;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* --- 町ランクバッジ --- */
    .town-rank {
      padding: 14px;
      border-radius: var(--radius-md);
      text-align: center;
      font-weight: 900;
      font-size: 1.2em;
      color: white;
      letter-spacing: 0.08em;
      position: relative;
      overflow: hidden;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    /* ランク別グラデーション */
    .town-rank.rank-s {
      background: linear-gradient(135deg, #ff8f00, #ffb300, #ffe082);
      box-shadow: 0 0 24px rgba(255, 179, 0, 0.3);
      animation: rank-glow 2s ease-in-out infinite;
    }
    .town-rank.rank-a {
      background: linear-gradient(135deg, #c62828, #ff5252, #ff8a80);
      box-shadow: 0 0 20px rgba(255, 82, 82, 0.25);
    }
    .town-rank.rank-b {
      background: linear-gradient(135deg, #4527a0, #7c4dff, #b388ff);
      box-shadow: 0 0 20px rgba(124, 77, 255, 0.25);
    }
    .town-rank.rank-c {
      background: linear-gradient(135deg, #1565c0, #42a5f5, #90caf9);
      box-shadow: 0 0 16px rgba(66, 165, 245, 0.2);
    }
    .town-rank.rank-d {
      background: linear-gradient(135deg, #2e7d32, #66bb6a, #a5d6a7);
      box-shadow: 0 0 16px rgba(102, 187, 106, 0.2);
    }
    .town-rank.rank-e {
      background: linear-gradient(135deg, #6a1b9a, #ab47bc, #ce93d8);
      box-shadow: 0 0 16px rgba(171, 71, 188, 0.2);
    }
    .town-rank.rank-f {
      background: linear-gradient(135deg, #424242, #757575, #bdbdbd);
    }

    @keyframes rank-glow {
      0%, 100% { box-shadow: 0 0 24px rgba(255, 179, 0, 0.3); }
      50% { box-shadow: 0 0 40px rgba(255, 179, 0, 0.5); }
    }

    /* ランクバッジのシマー */
    .town-rank::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
      animation: badge-shimmer 4s ease-in-out infinite;
    }

    @keyframes badge-shimmer {
      0% { left: -60%; }
      100% { left: 160%; }
    }

    /* --- 世界線表示 --- */
    .world-line-display {
      padding: 10px 14px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: var(--radius-md);
      text-align: center;
      font-size: 0.95em;
      font-weight: 700;
      color: var(--color-primary-light);
      letter-spacing: 0.04em;
    }

    /* --- 接続ステータス --- */
    .connection-status {
      margin-top: auto;
      padding: 10px 0 0;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.82em;
      color: rgba(255, 255, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: var(--color-success);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
      animation: status-pulse 2s ease-in-out infinite;
    }

    .status-dot.disconnected {
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
      animation: none;
    }

    @keyframes status-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
      50% { opacity: 0.6; box-shadow: 0 0 4px rgba(16, 185, 129, 0.3); }
    }

    /* --- フルスクリーンボタン --- */
    .fullscreen-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      background: rgba(15, 15, 40, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 18px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.85em;
      font-family: var(--font-sans);
      font-weight: 500;
      transition: all 0.25s var(--ease-out);
      letter-spacing: 0.02em;
    }

    .fullscreen-btn:hover {
      background: rgba(99, 102, 241, 0.3);
      border-color: rgba(99, 102, 241, 0.4);
      color: #fff;
    }

    /* --- 大画面対応（55インチモニター） --- */
    @media (min-width: 1920px) {
      .title-bar { padding: 24px 80px; }
      .title-text { font-size: 3.2em; }
      .title-icon { font-size: 2.8em; }

      .section-title { font-size: 1.8em; }

      .ranking-item { padding: 16px 18px; }
      .rank-medal { font-size: 2.6em; width: 64px; }
      .rank-name { font-size: 1.25em; }
      .rank-count { font-size: 1.7em; }

      .bar-label { font-size: 1em; }
      .bar { height: 28px; }
      .bar-fill { font-size: 0.82em; }

      .stat-label { font-size: 1.05em; }
      .stat-value { font-size: 2.4em; }

      .town-rank { font-size: 1.5em; padding: 18px; }

      .character-icon .char-img { width: 260px; height: 260px; }
      .character-icon .char-label { font-size: 1.15em; }
      .character-icon .char-glow { width: 220px; height: 220px; }
      .rank-thumb { width: 52px; height: 52px; }

      .results-panel { padding: 30px 28px; gap: 20px; }
      .world-line-display { font-size: 1.1em; }
    }

    /* 4Kディスプレイ */
    @media (min-width: 3000px) {
      .title-text { font-size: 4em; }
      .character-icon .char-img { width: 340px; height: 340px; }
      .rank-medal { font-size: 3.2em; }
      .stat-value { font-size: 3em; }
    }
  </style>
</head>
<body>

  <!-- アニメーション背景 -->
  <div class="bg-animated"></div>
  <div class="bg-radial"></div>

  <!-- パーティクルレイヤー（桜の花びらなど） -->
  <div class="particle-layer" id="bgAnimation"></div>

  <!-- フルスクリーンボタン -->
  <button class="fullscreen-btn" id="fullscreenBtn" title="フルスクリーン表示">&#x26F6; フルスクリーン</button>

  <!-- メインコンテナ -->
  <div class="container">

    <!-- タイトルバー -->
    <div class="title-bar">
      <span class="title-icon">&#x1F5F3;&#xFE0F;</span>
      <span class="title-text">浦安ご当地めいすいくん人気投票選挙</span>
      <span class="title-icon">&#x1F30F;</span>
    </div>

    <!-- コンテンツ -->
    <div class="content">

      <!-- 左パネル：キャラクターワールド -->
      <div class="world-map">
        <div class="character-world" id="characterWorld"></div>
      </div>

      <!-- 右パネル：投票結果 -->
      <div class="results-panel">

        <div class="section-title">&#x1F4CA; 得票ランキング</div>
        <div id="rankingContainer"></div>

        <div class="bar-chart" id="barChartContainer"></div>

        <div class="stats-section">
          <div class="stat-row">
            <span class="stat-label">総投票数</span>
            <span class="stat-value" id="totalVotes">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">投票率</span>
            <span class="stat-value" id="turnoutRate">0.0%</span>
          </div>
        </div>

        <div id="townRank" class="town-rank rank-f">町ランク: F</div>

        <div id="worldLineDisplay" class="world-line-display">第1世界線</div>

        <div class="connection-status">
          <span class="status-dot connected" id="statusDot"></span>
          <span id="statusText">接続中</span>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ============================================
    // Firebase 設定
    // ============================================
    const firebaseConfig = {
      apiKey: "AIzaSyCitq3ZmZ2lbF_mPSermXvbEE77X0jJW2o",
      authDomain: "meisui-world.firebaseapp.com",
      projectId: "meisui-world",
      storageBucket: "meisui-world.firebasestorage.app",
      messagingSenderId: "966808863030",
      appId: "1:966808863030:web:a1b85eb17974162c673397",
      databaseURL: "https://meisui-world-default-rtdb.firebaseio.com"
    };

    // Firebase 初期化
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ============================================
    // キャラクターデータ
    // ============================================
    const displayChars = [
      { key: 'meisui', name: 'イチョウめいすいくん', icon: '\u{1F333}', color: '#ffd700' },
      { key: 'tsutsuji', name: 'ツツジめいちゃん', icon: '\u{1F33A}', color: '#e040fb' },
      { key: 'meisui_chan', name: 'ビーナスめいちゃん', icon: '\u{1F3D6}\u{FE0F}', color: '#ff6b6b' },
      { key: 'bekabune', name: '浦安の海めいすいくん', icon: '\u{1F42C}', color: '#42a5f5' },
      { key: 'asari', name: '屋形船めいすいくん', icon: '\u{1F3EE}', color: '#ff8a65' },
      { key: 'ryoushi', name: '漁師めいすいくん', icon: '\u{1F41F}', color: '#66bb6a' }
    ];

    let voteData = {};
    let isOnline = false;

    // ============================================
    // 投票データ初期化
    // ============================================
    function initializeVotes() {
      displayChars.forEach(char => {
        voteData[char.key] = 0;
      });
    }

    // ============================================
    // キャラクターワールド描画（左パネル）
    // ============================================
    function renderCharacterWorld() {
      const worldDiv = document.getElementById('characterWorld');
      worldDiv.innerHTML = '';

      // キャラクター配置座標
      const positions = [
        { top: '20%', left: '15%' },
        { top: '30%', left: '70%' },
        { top: '50%', left: '25%' },
        { top: '60%', left: '75%' },
        { top: '75%', left: '40%' },
        { top: '40%', left: '50%' }
      ];

      displayChars.forEach((char, index) => {
        const iconDiv = document.createElement('div');
        iconDiv.className = 'character-icon';
        iconDiv.id = `char-${char.key}`;
        iconDiv.style.top = positions[index].top;
        iconDiv.style.left = positions[index].left;
        iconDiv.style.animationDelay = `${index * 0.5}s`;

        // キャラクター画像（config.jsから取得）
        const imgData = typeof charImages !== 'undefined' && charImages[char.key];
        if (imgData && imgData.src) {
          const img = document.createElement('img');
          img.className = 'char-img';
          img.src = imgData.src;
          img.alt = char.name;
          iconDiv.appendChild(img);
        } else {
          // フォールバック: 絵文字
          const emojiSpan = document.createTextNode(char.icon);
          iconDiv.appendChild(emojiSpan);
          iconDiv.style.fontSize = '5em';
        }

        // グローエフェクト（キャラカラー）
        const glow = document.createElement('div');
        glow.className = 'char-glow';
        glow.style.background = char.color;
        glow.style.animationDelay = `${index * 0.7}s`;
        iconDiv.appendChild(glow);

        // キャラ名ラベル
        const label = document.createElement('div');
        label.className = 'char-label';
        label.textContent = char.name;
        iconDiv.appendChild(label);

        worldDiv.appendChild(iconDiv);
      });
    }

    // ============================================
    // ランキング描画
    // ============================================
    function renderRanking(data) {
      const sorted = displayChars
        .map(char => ({
          ...char,
          votes: data[char.key] || 0
        }))
        .sort((a, b) => b.votes - a.votes);

      const container = document.getElementById('rankingContainer');
      container.innerHTML = '';

      const medals = ['\u{1F451}', '\u{1F948}', '\u{1F949}', '4\u{FE0F}\u{20E3}', '5\u{FE0F}\u{20E3}', '6\u{FE0F}\u{20E3}'];

      sorted.forEach((item, index) => {
        const rankDiv = document.createElement('div');
        rankDiv.className = 'ranking-item';
        rankDiv.id = `rank-${item.key}`;

        // キャラ画像サムネイル（config.jsから取得）
        const imgData = typeof charImages !== 'undefined' && charImages[item.key];
        const thumbHtml = imgData && imgData.src
          ? `<img class="rank-thumb" src="${imgData.src}" alt="${item.name}">`
          : '';

        rankDiv.innerHTML = `
          <div class="ranking-left">
            <div class="rank-medal">${medals[index]}</div>
            ${thumbHtml}
            <div class="rank-name">${item.name}</div>
          </div>
          <div class="rank-count">${item.votes}</div>
        `;

        container.appendChild(rankDiv);
      });
    }

    // ============================================
    // 棒グラフ描画
    // ============================================
    function renderBarChart(data) {
      const sorted = displayChars
        .map(char => ({
          ...char,
          votes: data[char.key] || 0
        }))
        .sort((a, b) => b.votes - a.votes);

      const total = Object.values(data).reduce((sum, v) => sum + v, 0) || 1;

      const container = document.getElementById('barChartContainer');
      container.innerHTML = '';

      sorted.forEach(item => {
        const percentage = Math.round((item.votes / total) * 100);
        const barDiv = document.createElement('div');
        barDiv.className = 'bar-item';
        barDiv.innerHTML = `
          <div class="bar-label">
            <span>${item.name}</span>
            <span class="bar-label-percent">${percentage}%</span>
          </div>
          <div class="bar">
            <div class="bar-fill ${item.key}" style="width: ${percentage}%">
              ${item.votes > 0 ? item.votes : ''}
            </div>
          </div>
        `;

        container.appendChild(barDiv);
      });
    }

    // ============================================
    // 町ランク計算
    // ============================================
    function calculateTownRank(totalVotes) {
      const totalPopulation = 171322;
      const maxVotes = 17;
      const expectedVotes = totalPopulation / maxVotes;
      const turnoutPercent = (totalVotes / expectedVotes) * 100;

      let rank = 'F';
      let className = 'rank-f';

      if (turnoutPercent >= 90) { rank = 'S'; className = 'rank-s'; }
      else if (turnoutPercent >= 75) { rank = 'A'; className = 'rank-a'; }
      else if (turnoutPercent >= 60) { rank = 'B'; className = 'rank-b'; }
      else if (turnoutPercent >= 45) { rank = 'C'; className = 'rank-c'; }
      else if (turnoutPercent >= 30) { rank = 'D'; className = 'rank-d'; }
      else if (turnoutPercent >= 15) { rank = 'E'; className = 'rank-e'; }

      return { rank, className, turnoutPercent };
    }

    // ============================================
    // 統計情報更新
    // ============================================
    function updateStats(data) {
      const totalVotes = Object.values(data).reduce((sum, v) => sum + v, 0);
      const { rank, className, turnoutPercent } = calculateTownRank(totalVotes);

      document.getElementById('totalVotes').textContent = totalVotes;
      document.getElementById('turnoutRate').textContent = turnoutPercent.toFixed(1) + '%';

      const rankDiv = document.getElementById('townRank');
      rankDiv.className = `town-rank ${className}`;
      rankDiv.textContent = `町ランク: ${rank}`;
    }

    // ============================================
    // 世界線オフセット監視
    // ============================================
    function listenToWorldLine() {
      database.ref('worldLineOffset').on('value', snapshot => {
        const offset = snapshot.val() || 0;
        const wlEl = document.getElementById('worldLineDisplay');
        if (wlEl) wlEl.textContent = '第' + (offset + 1) + '世界線';
      });
    }

    // ============================================
    // 投票リアルタイム監視
    // ============================================
    function listenToVotes() {
      database.ref('votes').on('value', snapshot => {
        const data = snapshot.val() || {};

        displayChars.forEach(char => {
          voteData[char.key] = data[char.key] || 0;
        });

        renderRanking(voteData);
        renderBarChart(voteData);
        updateStats(voteData);

        // 投票フラッシュアニメーション
        Object.keys(data).forEach(key => {
          const rankItem = document.getElementById(`rank-${key}`);
          if (rankItem) {
            rankItem.classList.remove('voted');
            setTimeout(() => rankItem.classList.add('voted'), 10);
          }
        });
      });
    }

    // ============================================
    // 接続状態リスナー
    // ============================================
    function setupConnectionListener() {
      database.ref('.info/connected').on('value', snapshot => {
        isOnline = snapshot.val();
        updateConnectionStatus();
      });
    }

    // 接続状態UI更新
    function updateConnectionStatus() {
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');

      if (isOnline) {
        statusDot.className = 'status-dot connected';
        statusText.textContent = '接続中 \u2713';
      } else {
        statusDot.className = 'status-dot disconnected';
        statusText.textContent = '接続待機中...';
      }
    }

    // ============================================
    // 桜の花びら生成（DOMの肥大化を防止）
    // ============================================
    const MAX_BLOSSOMS = 20;
    function createBlossom() {
      const bg = document.getElementById('bgAnimation');
      if (bg.querySelectorAll('.blossom').length >= MAX_BLOSSOMS) return;

      const blossom = document.createElement('div');
      blossom.className = 'particle blossom';
      blossom.textContent = '\u{1F338}';
      blossom.style.left = Math.random() * 100 + '%';
      blossom.style.fontSize = (Math.random() * 1.5 + 1) + 'em';
      blossom.style.opacity = Math.random() * 0.6 + 0.3;
      blossom.style.animationDuration = (Math.random() * 6 + 10) + 's';

      bg.appendChild(blossom);

      // 一定時間後に削除
      setTimeout(() => blossom.remove(), 16000);
    }

    // 桜を定期的に生成
    function setupBlossoms() {
      setInterval(createBlossom, 800);
    }

    // ============================================
    // フルスクリーンボタン
    // ============================================
    function setupFullscreenButton() {
      document.getElementById('fullscreenBtn').addEventListener('click', () => {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
          elem.requestFullscreen().catch(err => {
            alert(`フルスクリーン要求エラー: ${err.message}`);
          });
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        }
      });
    }

    // ============================================
    // 初期化
    // ============================================
    window.addEventListener('load', () => {
      initializeVotes();
      renderCharacterWorld();
      setupConnectionListener();
      listenToVotes();
      listenToWorldLine();
      setupBlossoms();
      setupFullscreenButton();
    });
  </script>
</body>
</html>
