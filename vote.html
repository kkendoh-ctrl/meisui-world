<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>浦安ご当地めいすいくん人気投票選挙 - 投票</title>
  <script src="js/config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="css/design-system.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* ===== ベース ===== */
    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    /* 紙テクスチャ風ノイズ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }

    /* 背景の柔らかいグラデーション */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at 30% 20%, rgba(255, 215, 0, 0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(224, 64, 251, 0.04) 0%, transparent 50%);
    }

    /* ===== 接続状態 ===== */
    .connection-status {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 100;
    }
    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: var(--radius-full);
      background: var(--color-success);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
      transition: all var(--duration-normal) var(--ease-out);
    }
    .status-dot.offline {
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
    }

    /* ===== 指示テキスト ===== */
    .instruction {
      text-align: center;
      padding: 14px 0 8px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .instruction-text {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-sans);
      font-size: var(--text-2xl);
      font-weight: 900;
      color: var(--color-text);
      letter-spacing: 3px;
    }
    .instruction-icon {
      font-size: 1.2em;
      animation: v2-breathe 2.5s ease-in-out infinite;
    }

    /* ===== キャラグリッド ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 16px;
      padding: 8px 16px 12px;
      flex: 1;
      min-height: 0;
      position: relative;
      z-index: 1;
    }

    /* ===== キャラカード（グラスモーフィズム） ===== */
    .char-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--glass-border);
      padding: 10px 8px 12px;
      min-height: 44px;
      text-align: center;
      box-shadow: var(--shadow-md);
      cursor: pointer;
      transition: all var(--spring-duration-fast) var(--ease-spring);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      position: relative;
    }

    /* リップルエフェクト */
    .char-card .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      animation: v2-ripple 0.6s var(--ease-spring) forwards;
      pointer-events: none;
      width: 40px;
      height: 40px;
      transform: scale(0);
    }

    .char-card:hover {
      box-shadow: var(--shadow-card-hover);
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .char-card:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-sm);
    }

    /* 選択状態：キャラカラーのグロー */
    .char-card.selected {
      border-color: var(--card-color, var(--color-accent));
      box-shadow: 0 0 0 3px var(--card-color-alpha, rgba(196, 30, 58, 0.25)),
                  0 0 24px var(--card-color-alpha, rgba(196, 30, 58, 0.15)),
                  var(--shadow-lg);
      background: rgba(255, 255, 255, 0.85);
    }

    .char-card img {
      width: 100%;
      flex: 1;
      min-height: 0;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.08));
      transition: transform var(--spring-duration-fast) var(--ease-spring);
    }
    .char-card:hover img {
      transform: scale(1.03);
    }
    .char-card.selected img {
      transform: scale(1.05);
    }

    /* 名前 */
    .char-name {
      font-weight: 900;
      line-height: 1.1;
      font-size: 1.05em;
      white-space: nowrap;
      color: var(--color-text);
      font-family: var(--font-sans);
      margin-top: 4px;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }

    /* ===== 投票フィードバック バウンス ===== */
    .grid.just-voted {
      animation: grid-bounce var(--spring-duration-fast) var(--ease-spring-bouncy);
    }
    @keyframes grid-bounce {
      0% { transform: scale(1); }
      50% { transform: scale(0.98); }
      100% { transform: scale(1); }
    }

    /* ===== フッター ===== */
    .footer {
      text-align: center;
      padding: 8px 0;
      flex-shrink: 0;
      border-top: 1px solid var(--color-border);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
      font-family: var(--font-sans);
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(8px);
    }

    /* ===== 確認ダイアログ ===== */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: v2-fadeIn 0.2s ease-out;
    }
    .confirm-card {
      background: var(--color-bg-warm);
      border-radius: var(--radius-xl);
      padding: 36px 44px;
      text-align: center;
      max-width: 520px;
      width: 85%;
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--color-border);
      animation: v2-fadeInScale 0.3s var(--ease-spring-bouncy);
    }
    .confirm-card img {
      width: 200px;
      height: auto;
      margin: 0 auto 20px;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.15));
    }
    .confirm-name {
      font-size: 2.2em;
      font-weight: 900;
      margin-bottom: 8px;
      font-family: var(--font-sans);
    }
    .confirm-msg {
      font-size: 1.5em;
      color: var(--color-text-muted);
      margin-bottom: 28px;
      font-family: var(--font-serif);
      letter-spacing: 2px;
    }
    .confirm-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .confirm-btns button {
      font-size: 1.5em;
      font-weight: bold;
      padding: 16px 44px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all var(--duration-fast) var(--ease-spring-gentle);
      -webkit-tap-highlight-color: transparent;
    }
    .confirm-btns button:active {
      transform: scale(0.95);
    }
    .confirm-yes {
      background: var(--color-accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(196, 30, 58, 0.35);
      letter-spacing: 2px;
    }
    .confirm-yes:hover {
      box-shadow: 0 6px 24px rgba(196, 30, 58, 0.45);
    }
    .confirm-no {
      background: var(--color-border);
      color: var(--color-text-muted);
    }
    .confirm-no:hover {
      background: #D4CFC5;
    }

    /* ===== 感謝オーバーレイ ===== */
    .thank-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: v2-fadeIn 0.3s ease-out;
      pointer-events: all;
      overflow: hidden;
    }
    .thank-overlay img {
      width: 360px;
      height: 360px;
      object-fit: contain;
      margin-bottom: 20px;
      filter: drop-shadow(0 12px 40px rgba(0, 0, 0, 0.25));
      animation: v2-float 3s ease-in-out infinite;
    }
    .thank-text {
      font-size: 3.6em;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      line-height: 1.5;
      font-family: var(--font-sans);
    }
    .thank-next {
      font-size: 2.6em;
      font-weight: 900;
      color: #fff;
      margin-top: 28px;
      animation: blink 0.8s ease-in-out infinite;
      font-family: var(--font-sans);
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 2px 8px rgba(0, 0, 0, 0.3);
      letter-spacing: 3px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.97); }
    }

    /* 紙吹雪パーティクル */
    .confetti-particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: v2-confetti-fall linear forwards;
      pointer-events: none;
      top: -10px;
    }

    /* ===== 投票用紙カットイン ===== */
    @keyframes ballotBoxAppear {
      0%   { transform: translateX(-50%) scale(0); }
      65%  { transform: translateX(-50%) scale(1.12); }
      100% { transform: translateX(-50%) scale(1); }
    }
    @keyframes ballotBoxShake {
      0%, 100% { transform: translateX(-50%) scale(1) rotate(0deg); }
      20%  { transform: translateX(calc(-50% - 24px)) scale(1.06) rotate(-5deg); }
      40%  { transform: translateX(calc(-50% + 24px)) scale(1.06) rotate(5deg); }
      60%  { transform: translateX(calc(-50% - 12px)) scale(1.02) rotate(-2deg); }
      80%  { transform: translateX(calc(-50% + 12px)) scale(1.02) rotate(2deg); }
    }
    @keyframes ballotPaperFall {
      0%   { transform: translateX(-50%) translateY(-660px) rotate(-8deg); opacity: 0; }
      12%  { opacity: 1; }
      64%  { transform: translateX(-50%) translateY(360px) rotate(-1deg); opacity: 1; }
      80%  { transform: translateX(-50%) translateY(414px) scaleY(0.45) rotate(0deg); opacity: 0.7; }
      93%  { transform: translateX(-50%) translateY(444px) scaleY(0.08) rotate(0deg); opacity: 0.2; }
      100% { transform: translateX(-50%) translateY(456px) scaleY(0) rotate(0deg); opacity: 0; }
    }
    @keyframes ballotDoneText {
      0%   { transform: translateX(-50%) scale(0); opacity: 0; }
      60%  { transform: translateX(-50%) scale(1.18); opacity: 1; }
      100% { transform: translateX(-50%) scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ===== 管理者用リセットボタン ===== */
    .admin-footer {
      display: none;
      position: fixed;
      bottom: 8px;
      right: 8px;
      z-index: 100;
    }
    .reset-btn {
      background: #78909c;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8em;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity var(--duration-fast);
    }
    .reset-btn:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- 接続状態 -->
  <div class="connection-status">
    <span class="status-dot" id="statusDot" aria-label="接続状態" role="status"></span>
  </div>

  <!-- 指示 -->
  <div class="instruction">
    <span class="instruction-text">
      <span class="instruction-icon">&#x1F5F3;&#xFE0F;</span>
      好きなキャラクターをタップしてね
    </span>
  </div>

  <!-- グリッド -->
  <div class="grid" id="grid"></div>

  <!-- フッター -->
  <div class="footer">浦安市明るい選挙推進協議会 ／ 浦安市選挙管理委員会</div>

  <!-- 管理者 -->
  <div class="admin-footer" id="adminFooter">
    <button class="reset-btn" id="resetBtn">リセット</button>
  </div>

  <script>
    // Firebase初期化
    firebase.initializeApp({
      apiKey: "AIzaSyCitq3ZmZ2lbF_mPSermXvbEE77X0jJW2o",
      authDomain: "meisui-world.firebaseapp.com",
      databaseURL: "https://meisui-world-default-rtdb.firebaseio.com",
      projectId: "meisui-world",
      storageBucket: "meisui-world.firebasestorage.app",
      messagingSenderId: "966808863030",
      appId: "1:966808863030:web:a1b85eb17974162c673397"
    });
    const db = firebase.database();

    let voting = false;
    let currentVotes = {};

    function getNextMilestone(charType) {
      const v = currentVotes[charType] || 0;
      const effect = charEffects[charType];
      if (!effect) return null;
      for (let i = 0; i < effect.thresholds.length; i++) {
        if (v < effect.thresholds[i]) {
          return { remaining: effect.thresholds[i] - v, label: effect.levels[i] };
        }
      }
      return null;
    }

    function updatePreviews() {}

    // リップルエフェクト生成
    function createRipple(e, card) {
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const rect = card.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left - 20;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top - 20;
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      card.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    }

    // 紙吹雪パーティクル生成
    function spawnConfetti(container, color) {
      const colors = [color, '#FFD700', '#FF6B6B', '#42A5F5', '#66BB6A', '#E040FB', '#fff'];
      for (let i = 0; i < 50; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        p.style.width = (6 + Math.random() * 8) + 'px';
        p.style.height = (6 + Math.random() * 8) + 'px';
        p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        p.style.animationDuration = (2 + Math.random() * 3) + 's';
        p.style.animationDelay = (Math.random() * 1.5) + 's';
        p.style.opacity = 0.8 + Math.random() * 0.2;
        container.appendChild(p);
      }
    }

    // キャラカード生成
    function renderGrid() {
      const grid = document.getElementById('grid');
      const policies = {
        meisui: '環境・緑化',
        tsutsuji: '子育て・教育',
        meisui_chan: '観光・まちづくり',
        bekabune: '環境保全・三番瀬',
        asari: '文化・伝統継承',
        ryoushi: '産業振興・商業',
      };
      const shortNames = {
        meisui: 'イチョウめいすいくん',
        tsutsuji: 'ツツジめいちゃん',
        meisui_chan: 'ビーナスめいちゃん',
        bekabune: '浦安の海めいすいくん',
        asari: '屋形船めいすいくん',
        ryoushi: '漁師めいすいくん',
      };

      // キャラ順をシャッフル（ページ読み込みごとにランダム）
      const shuffled = [...CHAR_TYPES].sort(() => Math.random() - 0.5);
      shuffled.forEach(type => {
        const meta = charMetadata[type];
        const img = charImages[type];

        const card = document.createElement('div');
        card.className = 'char-card';
        card.dataset.type = type;
        // キャラカラーをCSS変数に設定
        card.style.setProperty('--card-color', meta.color);
        card.style.setProperty('--card-color-alpha', meta.color + '40');

        // キャラ画像
        const imgEl = document.createElement('img');
        imgEl.src = img.src;
        imgEl.alt = meta.name;
        card.appendChild(imgEl);

        // 名前
        const nameEl = document.createElement('div');
        nameEl.className = 'char-name';
        nameEl.textContent = shortNames[type] || meta.name;
        card.appendChild(nameEl);

        card.addEventListener('click', (e) => {
          // リップルエフェクト
          createRipple(e, card);
          // 選択状態のアニメーション
          document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          setTimeout(() => vote(type), 300);
        });
        grid.appendChild(card);
      });
    }

    // 確認ダイアログ
    function vote(type) {
      if (voting) return;
      const meta = charMetadata[type];
      const img = charImages[type];

      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML = `
        <div class="confirm-card" style="border-top:3px solid ${meta.color};">
          ${img?.src ? '<img src="' + img.src + '" alt="' + meta.name + '">' : ''}
          <div class="confirm-name" style="color:${meta.color};">${meta.name}</div>
          <div class="confirm-msg">に投票しますか？</div>
          <div class="confirm-btns">
            <button class="confirm-no" id="confirmNo">やめる</button>
            <button class="confirm-yes" style="background:${meta.color};box-shadow:0 4px 16px ${meta.color}44;" id="confirmYes">投票する</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector('#confirmNo').addEventListener('click', () => {
        overlay.remove();
        document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
      });
      overlay.querySelector('#confirmYes').addEventListener('click', () => {
        overlay.remove();
        doVote(type);
      });
    }

    // 投票処理
    function doVote(type) {
      if (voting) return;
      voting = true;

      // 裏EDフラグチェック
      if (localStorage.getItem('secretEdFlag') === 'true') {
        // 全票（63票）をこのキャラに入れて裏EDへ
        const totalNeeded = 63;
        const voteRef = db.ref(`votes/${type}`);
        voteRef.transaction(current => (current || 0) + totalNeeded)
          .then(result => {
            if (result.committed) {
              db.ref('stats').update({
                lastVoteChar: type + '|' + Date.now(),
                lastVoteTime: Date.now()
              }).catch(() => {});
              // フラグをクリア
              localStorage.removeItem('secretEdFlag');
              // 裏EDへ遷移（投票箱演出後）
              const meta = charMetadata[type];
              showBallotCutin(type, meta);
              setTimeout(() => {
                window.location.href = 'ending-secret.html';
              }, 3500);
            }
          })
          .catch(err => {
            console.error('裏ED投票失敗:', err);
            voting = false;
          });
        return;
      }

      // 通常投票
      const voteRef = db.ref(`votes/${type}`);
      voteRef.transaction(current => (current || 0) + 1)
        .then(result => {
          if (result.committed) {
            db.ref('stats').update({
              lastVoteChar: type + '|' + Date.now(),
              lastVoteTime: Date.now()
            }).catch(err => console.warn('stats通知失敗:', err));
            document.getElementById('grid').classList.add('just-voted');
            setTimeout(() => document.getElementById('grid').classList.remove('just-voted'), 400);
            showThankYou(type);
          } else {
            voting = false;
          }
        })
        .catch(err => {
          console.error('投票失敗:', err);
          voting = false;
        });
    }

    // 投票用紙カットイン
    function showBallotCutin(type, meta) {
      const charColor = meta.color;
      const charName = meta.name;

      const cutin = document.createElement('div');
      cutin.style.cssText = `
        position:fixed;inset:0;z-index:600;
        pointer-events:none;background:rgba(10,10,30,0.88);
        display:flex;align-items:center;justify-content:center;
      `;

      const container = document.createElement('div');
      container.style.cssText = 'position:relative;width:780px;height:1200px;';

      // 投票箱
      const boxEl = document.createElement('div');
      boxEl.style.cssText = `
        position:absolute;bottom:20px;left:50%;
        transform:translateX(-50%) scale(0);
        animation:ballotBoxAppear 0.45s 0.1s var(--ease-spring-bouncy) forwards,
                  ballotBoxShake 0.45s 1.55s var(--ease-spring) forwards;
        transform-origin:bottom center;
      `;
      boxEl.innerHTML = `
        <svg width="450" height="510" viewBox="0 0 150 170" style="filter:drop-shadow(0 12px 36px rgba(0,0,0,0.6))">
          <defs>
            <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#2E7D32"/>
              <stop offset="100%" stop-color="#1B5E20"/>
            </linearGradient>
            <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#43A047"/>
              <stop offset="100%" stop-color="#2E7D32"/>
            </linearGradient>
          </defs>
          <rect x="8" y="52" width="134" height="110" rx="10" fill="url(#boxGrad)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
          <rect x="8" y="52" width="134" height="26" rx="10" fill="rgba(255,255,255,0.08)"/>
          <rect x="4" y="36" width="142" height="22" rx="6" fill="url(#lidGrad)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
          <rect x="42" y="40" width="66" height="9" rx="4" fill="#1B5E20"/>
          <rect x="22" y="90" width="106" height="38" rx="6" fill="rgba(255,255,255,0.08)"/>
          <text x="75" y="107" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="'Noto Sans JP', sans-serif">めいすいくん</text>
          <text x="75" y="122" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10" font-family="'Noto Sans JP', sans-serif">人気投票選挙</text>
          <rect x="15" y="154" width="120" height="4" rx="2" fill="rgba(0,0,0,0.2)"/>
        </svg>
      `;

      // 投票用紙
      const paper = document.createElement('div');
      paper.style.cssText = `
        position:absolute;top:0;left:50%;
        transform:translateX(-50%) translateY(-660px) rotate(-8deg);
        transform-origin:top center;
        width:474px;
        background:#FFFDF8;border:3px solid #D4C9B8;border-radius:12px;
        padding:36px 30px;text-align:center;
        box-shadow:0 12px 48px rgba(0,0,0,0.45);
        font-family:'Noto Serif JP','Hiragino Sans',serif;
        animation:ballotPaperFall 1.25s 0.35s ease-in forwards;
      `;
      paper.innerHTML = `
        <div style="font-size:22px;color:#999;letter-spacing:4px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #E5DDD0;">浦安ご当地めいすいくん人気投票選挙</div>
        <div style="font-size:24px;color:#999;margin-bottom:24px;letter-spacing:6px;">投 票 用 紙</div>
        <div style="font-size:52px;font-weight:900;color:${charColor};border:4px solid ${charColor};border-radius:8px;padding:18px 12px;position:relative;">
          <span style="position:absolute;top:-14px;left:12px;font-size:36px;color:#C41E3A;">&#9675;</span>
          ${charName}
        </div>
      `;

      // 完了テキスト
      const doneText = document.createElement('div');
      doneText.style.cssText = `
        position:absolute;bottom:615px;left:50%;
        transform:translateX(-50%) scale(0);
        white-space:nowrap;font-size:60px;font-weight:900;color:#fff;
        font-family:'Noto Sans JP',sans-serif;
        text-shadow:0 0 18px ${charColor},2px 2px 0 #000;
        animation:ballotDoneText 0.4s 1.8s var(--ease-spring-bouncy) forwards;
      `;
      doneText.textContent = '\uD83D\uDCEC 入りました！';

      container.appendChild(paper);
      container.appendChild(boxEl);
      container.appendChild(doneText);
      cutin.appendChild(container);
      document.body.appendChild(cutin);

      setTimeout(() => {
        cutin.style.transition = 'opacity 0.35s';
        cutin.style.opacity = '0';
        setTimeout(() => cutin.remove(), 350);
      }, 3300);
    }

    // 感謝画面
    function showThankYou(type) {
      const meta = charMetadata[type];
      const img = charImages[type];
      showBallotCutin(type, meta);

      setTimeout(() => {
        const overlay = document.createElement('div');
        overlay.className = 'thank-overlay';
        overlay.style.background = `linear-gradient(135deg, ${meta.color}dd, ${meta.color}88)`;
        overlay.innerHTML = `
          <img src="${img.src}" alt="${meta.name}">
          <div class="thank-text">
            ${meta.name}に<br>投票しました！<br>ありがとう！&#x1F5F3;&#xFE0F;
          </div>
          <div class="thank-next">つぎのひとと こうたいしてね</div>
        `;
        // 紙吹雪を追加
        spawnConfetti(overlay, meta.color);
        document.body.appendChild(overlay);

        setTimeout(() => {
          overlay.style.transition = 'opacity 0.3s';
          overlay.style.opacity = '0';
          setTimeout(() => {
            overlay.remove();
            voting = false;
            // キャラの順番をシャッフルして再描画
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            renderGrid();
          }, 300);
        }, 3500);
      }, 3300);
    }

    // 接続状態
    db.ref('.info/connected').on('value', snap => {
      const dot = document.getElementById('statusDot');
      if (dot) dot.className = snap.val() ? 'status-dot' : 'status-dot offline';
    });

    // 管理者モード
    function setupAdmin() {
      if (new URLSearchParams(location.search).get('admin') !== '1') return;
      const footer = document.getElementById('adminFooter');
      footer.style.display = 'block';
      document.getElementById('resetBtn').addEventListener('click', () => {
        if (!confirm('全投票をリセットしますか？')) return;
        const zeroVotes = Object.fromEntries(CHAR_TYPES.map(t => [t, 0]));
        db.ref('votes').set(zeroVotes);
        db.ref('worldLineOffset').set(0);
        db.ref('stats/cycleStartVotes').set(0);
        db.ref('stats/decorationOffset').set(zeroVotes);
        db.ref('stats/cycleStartPerChar').set(zeroVotes);
        alert('リセットしました');
      });
    }

    renderGrid();
    setupAdmin();
    db.ref('votes').on('value', snap => {
      currentVotes = snap.val() || {};
      updatePreviews();
    });
  </script>
</body>
</html>
