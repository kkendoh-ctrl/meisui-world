<link rel="stylesheet" href="css/design-system.css">
<script src="js/config.js"></script>

<style>
/* =============================================
   エンディングクレジット - シネマティックデザイン
   ============================================= */

/* --- 基本レイアウト --- */
body {
    width: 100%; height: 100vh; overflow: hidden;
    background: #0a0a14; position: relative;
    font-family: var(--font-serif);
    color: var(--color-text-light);
}

/* --- 星空パーティクル --- */
.star {
    position: fixed; border-radius: 50%; background: #fff;
    pointer-events: none; z-index: 0;
    animation: starTwinkle var(--dur) ease-in-out var(--delay) infinite;
}
@keyframes starTwinkle {
    0%, 100% { opacity: 0.15; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.6); }
}

/* 光のパーティクル */
.particle {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 1;
    animation: particleFloat var(--dur) ease-in-out var(--delay) infinite;
}
@keyframes particleFloat {
    0%, 100% { transform: translateY(0) scale(1); opacity: var(--op); }
    50% { transform: translateY(-30px) scale(1.4); opacity: calc(var(--op) * 1.8); }
}

/* 流れ星 */
.shooting-star {
    position: fixed; pointer-events: none; z-index: 1;
    width: 80px; height: 1px;
    background: linear-gradient(90deg, rgba(255,215,0,0.8), transparent);
    opacity: 0;
    animation: shootingStar var(--dur) var(--delay) linear infinite;
}
@keyframes shootingStar {
    0% { opacity: 0; transform: translate(0, 0) rotate(-35deg); }
    2% { opacity: 1; }
    8% { opacity: 0; transform: translate(-200px, 120px) rotate(-35deg); }
    100% { opacity: 0; }
}

/* --- グラデーションフェード --- */
.grad-top {
    position: fixed; top: 0; left: 0; right: 0; height: 28vh;
    background: linear-gradient(to bottom, #0a0a14 0%, #0a0a14 20%, transparent 100%);
    z-index: 10; pointer-events: none;
}
.grad-bottom {
    position: fixed; bottom: 0; left: 0; right: 0; height: 28vh;
    background: linear-gradient(to top, #0a0a14 0%, #0a0a14 20%, transparent 100%);
    z-index: 10; pointer-events: none;
}

/* --- タイトル画面 --- */
#titleScreen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20; cursor: pointer;
}
#titleText {
    color: var(--color-meisui);
    font-size: var(--text-5xl);
    font-weight: 700;
    letter-spacing: 0.35em;
    animation: titleReveal 3s var(--ease-spring) forwards;
    margin-bottom: var(--space-4);
    text-shadow:
        0 0 40px rgba(255,215,0,0.5),
        0 0 80px rgba(255,215,0,0.2),
        0 2px 4px rgba(0,0,0,0.5);
}
#titleSub {
    color: rgba(255,255,255,0.35);
    font-size: var(--text-sm);
    font-weight: 300;
    letter-spacing: 0.2em;
    margin-bottom: var(--space-16);
    animation: fadeIn 2s 1.2s var(--ease-out) forwards;
    opacity: 0;
}
#tapText {
    color: rgba(255,255,255,0.3);
    font-size: var(--text-sm);
    font-family: var(--font-sans);
    letter-spacing: 0.25em;
    animation: breathe 3s ease-in-out infinite;
    padding: var(--space-3) var(--space-8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius-full);
}
/* タイトルの装飾ライン */
#titleScreen::before,
#titleScreen::after {
    content: '';
    position: absolute; left: 50%; transform: translateX(-50%);
    width: min(200px, 40vw); height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
    animation: fadeIn 2s 0.8s var(--ease-out) forwards;
    opacity: 0;
}
#titleScreen::before { top: calc(50% - 80px); }
#titleScreen::after { top: calc(50% + 50px); }

/* タイトルアニメーション */
@keyframes titleReveal {
    from { opacity: 0; letter-spacing: 1.5em; filter: blur(10px); transform: scale(0.9); }
    to { opacity: 1; letter-spacing: 0.35em; filter: blur(0); transform: scale(1); }
}
@keyframes breathe {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.6; }
}
@keyframes fadeIn { to { opacity: 1; } }
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* --- メインコンテンツ --- */
#mainContent { display: none; }

/* スクロールコンテナ */
#scrollWrap {
    position: fixed; inset: 0;
    display: flex; justify-content: center;
    z-index: 3; pointer-events: none; overflow: hidden;
}
#scrollInner {
    width: min(92%, 800px); position: relative;
}

/* --- テキスト行スタイル --- */
.ln { text-align: center; margin-bottom: 6px; }

.ln-title {
    color: var(--color-meisui);
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 700;
    letter-spacing: 0.3em;
    margin: var(--space-10) 0 var(--space-5);
    animation: glowPulse 4s ease-in-out infinite;
    text-shadow:
        0 0 30px rgba(255,215,0,0.4),
        0 0 60px rgba(255,215,0,0.15);
}
@keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 20px rgba(255,215,0,0.3), 0 0 60px rgba(255,215,0,0.1); }
    50% { text-shadow: 0 0 40px rgba(255,215,0,0.6), 0 0 100px rgba(255,215,0,0.25), 0 0 150px rgba(255,215,0,0.08); }
}

.ln-section {
    color: rgba(255,215,0,0.7);
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    font-weight: 600;
    letter-spacing: 0.2em;
    margin: var(--space-10) 0 var(--space-4);
    position: relative;
}
/* セクション区切りの装飾 */
.ln-section::after {
    content: '';
    display: block;
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.4), transparent);
    margin: var(--space-3) auto 0;
}

.ln-normal {
    color: rgba(255,255,255,0.85);
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    font-weight: 300;
    line-height: 2.2;
    letter-spacing: 0.08em;
}

.ln-accent {
    color: var(--color-meisui);
    font-size: clamp(1.2rem, 2.8vw, 1.7rem);
    font-weight: 600;
    line-height: 2.0;
    letter-spacing: 0.1em;
    text-shadow: 0 0 12px rgba(255,215,0,0.15);
}

.ln-small {
    color: rgba(255,255,255,0.5);
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    font-weight: 300;
    line-height: 2.0;
    letter-spacing: 0.06em;
}

/* キャラクター名のカラー */
.ln-char-name {
    font-size: var(--text-lg);
    font-weight: 600;
    line-height: 2.0;
    letter-spacing: 0.1em;
    text-shadow: 0 0 15px currentColor;
}
.ln-char-name[data-char="meisui"] { color: var(--color-meisui); }
.ln-char-name[data-char="tsutsuji"] { color: var(--color-tsutsuji); }
.ln-char-name[data-char="venus"] { color: var(--color-meisui-chan); }
.ln-char-name[data-char="umi"] { color: var(--color-bekabune); }
.ln-char-name[data-char="yakatabune"] { color: var(--color-asari); }
.ln-char-name[data-char="ryoushi"] { color: var(--color-ryoushi); }

/* スペーサー */
.ln-empty { height: 40px; }
.ln-big-empty { height: 80px; }
.ln-huge-empty { height: 140px; }

/* --- キャラクター画像（セクション間） --- */
.walking-char {
    display: flex; justify-content: center;
    margin: var(--space-8) 0;
    filter: drop-shadow(0 4px 24px rgba(255,215,0,0.4));
}
.walking-char img {
    width: 180px;
    height: 180px;
    object-fit: contain;
    animation: v2-float 4s ease-in-out infinite;
}

/* --- キャラクター証言カード (グラスモーフィズム) --- */
.testimonial-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius-xl);
    padding: var(--space-8) var(--space-10);
    margin: var(--space-6) auto;
    max-width: 600px;
    text-align: center;
    position: relative;
    overflow: hidden;
}
.testimonial-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--card-color, rgba(255,215,0,0.5)), transparent);
}
.testimonial-card .card-img {
    width: 140px;
    height: 140px;
    object-fit: contain;
    margin: 0 auto var(--space-4);
    filter: drop-shadow(0 4px 20px rgba(255,215,0,0.3));
}
.testimonial-card .card-name {
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    font-weight: 600;
    letter-spacing: 0.15em;
    margin-bottom: var(--space-3);
    color: var(--card-color, var(--color-meisui));
}
.testimonial-card .card-text {
    font-size: clamp(1rem, 2.2vw, 1.3rem);
    font-weight: 300;
    line-height: 2;
    color: rgba(255,255,255,0.75);
}

/* --- コントロール --- */
#controls {
    position: fixed; bottom: var(--space-4); right: var(--space-4);
    z-index: 30; display: flex; gap: var(--space-2);
    opacity: 0; transition: opacity 1s var(--ease-out);
}
#controls.show { opacity: 1; }
#controls button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5);
    border-radius: var(--radius-md);
    padding: var(--space-2) var(--space-4);
    font-size: var(--text-xs);
    font-family: var(--font-sans);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all var(--duration-normal) var(--ease-out);
}
#controls button:hover {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.85);
    border-color: rgba(255,255,255,0.2);
}

/* --- プログレスバー --- */
#progressBar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 2px; background: rgba(255,255,255,0.05);
    z-index: 30;
}
#progressFill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--color-meisui), #FFA500);
    transition: width 0.1s linear;
    box-shadow: 0 0 8px rgba(255,215,0,0.4);
}

/* --- 戻るボタン --- */
#backBtn {
    position: fixed; top: var(--space-3); left: var(--space-4);
    z-index: 30;
    padding: var(--space-2) var(--space-4);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.35);
    border-radius: var(--radius-md);
    font-size: var(--text-xs);
    font-family: var(--font-sans);
    cursor: pointer; text-decoration: none;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0; transition: all var(--duration-slow) var(--ease-out);
}
#backBtn:hover {
    color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.15);
}

/* --- 最終メッセージの特殊演出 --- */
.ln-final {
    color: var(--color-meisui);
    font-size: var(--text-3xl);
    font-weight: 700;
    letter-spacing: 0.3em;
    text-shadow:
        0 0 40px rgba(255,215,0,0.5),
        0 0 80px rgba(255,215,0,0.2);
    animation: glowPulse 4s ease-in-out infinite;
}

/* --- ビネット効果 --- */
.vignette {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
}
</style>
</head>

// キャラクターカラーマップ
const CHAR_COLORS = {
    meisui:     'var(--color-meisui)',
    tsutsuji:   'var(--color-tsutsuji)',
    venus:      'var(--color-meisui-chan)',
    umi:        'var(--color-bekabune)',
    yakatabune: 'var(--color-asari)',
    ryoushi:    'var(--color-ryoushi)',
};

// キャラ名→config.jsキー対応
const CHAR_KEY_MAP = {
    meisui:     'meisui',
    tsutsuji:   'tsutsuji',
    venus:      'meisui_chan',
    umi:        'bekabune',
    yakatabune: 'asari',
    ryoushi:    'ryoushi',
};

// config.jsからキャラ画像を取得
function getCharImgSrc(charId) {
    const key = CHAR_KEY_MAP[charId] || charId;
    if (typeof charImages !== 'undefined' && charImages[key] && charImages[key].src) {
        return charImages[key].src;
    }
    return null;
}

// =============================================
// 初期化
// =============================================
function init() {
    // 星の生成
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const sz = Math.random() * 2.5 + 0.5;
        s.style.cssText = `
            left:${Math.random()*100}%;
            top:${Math.random()*100}%;
            width:${sz}px; height:${sz}px;
            --dur:${2+Math.random()*5}s;
            --delay:${Math.random()*4}s;
        `;
        starsEl.appendChild(s);
    }

    // 光パーティクルの生成
    const pEl = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const sz = Math.random() * 4 + 1;
        const op = Math.random() * 0.25 + 0.08;
        const hue = Math.random() > 0.7 ? '255,215,0' : '200,200,255';
        p.style.cssText = `
            left:${Math.random()*100}%;
            top:${Math.random()*100}%;
            width:${sz}px; height:${sz}px;
            --op:${op};
            background:rgba(${hue},${op});
            box-shadow: 0 0 ${sz*3}px rgba(${hue},${op*0.5});
            --dur:${6+Math.random()*10}s;
            --delay:${Math.random()*6}s;
        `;
        pEl.appendChild(p);
    }

    // 流れ星の生成
    const ssEl = document.getElementById('shootingStars');
    for (let i = 0; i < 4; i++) {
        const ss = document.createElement('div');
        ss.className = 'shooting-star';
        ss.style.cssText = `
            left:${20+Math.random()*60}%;
            top:${5+Math.random()*40}%;
            --dur:${8+Math.random()*12}s;
            --delay:${Math.random()*15}s;
        `;
        ssEl.appendChild(ss);
    }

    // キャラ画像ローテーション用カウンタ
    let charImageIndex = 0;

    // テキスト要素の構築
    const inner = document.getElementById('scrollInner');

    // 上部スペース（画面下から始まるように）
    const topPad = document.createElement('div');
    topPad.style.height = '110vh';
    inner.appendChild(topPad);

    LINES.forEach(line => {
        if (line.t === 'card') {
            // グラスモーフィズムのキャラカード（実画像付き）
            const card = document.createElement('div');
            card.className = 'testimonial-card';
            card.style.setProperty('--card-color', CHAR_COLORS[line.char] || CHAR_COLORS.meisui);
            const imgSrc = getCharImgSrc(line.char);
            const imgHtml = imgSrc ? `<img class="card-img" src="${imgSrc}" alt="${line.name}">` : '';
            card.innerHTML = `
                ${imgHtml}
                <div class="card-name" style="color:${CHAR_COLORS[line.char]}">${line.name}</div>
                <div class="card-text">${line.text}</div>
            `;
            inner.appendChild(card);
            return;
        }

        const el = document.createElement('div');
        if (line.t === 'empty') {
            el.className = 'ln-empty';
        } else if (line.t === 'big') {
            el.className = 'ln-big-empty';
        } else if (line.t === 'huge') {
            el.className = 'ln-huge-empty';
        } else if (line.t === 'title') {
            el.className = 'ln ln-title';
            el.textContent = line.v;
            // イースターエッグ: "Fin" を3回タップで裏歴史ページへ
            if (line.v && line.v.includes('Fin')) {
                el.style.cursor = 'pointer';
                el.style.pointerEvents = 'auto';
                let finTapCount = 0;
                let finTapTimer = null;
                el.addEventListener('click', () => {
                    finTapCount++;
                    clearTimeout(finTapTimer);
                    if (finTapCount >= 3) {
                        el.style.textShadow = '0 0 60px rgba(255,215,0,1), 0 0 120px rgba(255,215,0,0.6)';
                        el.style.transition = 'text-shadow 0.5s, opacity 1s';
                        setTimeout(() => { el.style.opacity = '0'; }, 300);
                        setTimeout(() => { window.location.href = 'ending-secret.html'; }, 1200);
                    } else {
                        // タップフィードバック（光る）
                        el.style.textShadow = `0 0 ${20 + finTapCount * 20}px rgba(255,215,0,${0.3 + finTapCount * 0.2})`;
                        finTapTimer = setTimeout(() => { finTapCount = 0; el.style.textShadow = ''; }, 2000);
                    }
                });
            }
        } else if (line.t === 'section') {
            el.className = 'ln ln-section';
            el.textContent = line.v;
        } else if (line.t === 'accent') {
            el.className = 'ln ln-accent';
            el.textContent = line.v;
        } else if (line.t === 'small') {
            el.className = 'ln ln-small';
            el.textContent = line.v;
        } else if (line.t === 'charName') {
            el.className = 'ln ln-char-name';
            el.setAttribute('data-char', line.char || 'meisui');
            el.textContent = line.v;
        } else if (line.t === 'char') {
            el.className = 'walking-char';
            // 実際のキャラ画像をローテーション表示
            const charKeys = typeof CHAR_TYPES !== 'undefined' ? CHAR_TYPES : Object.keys(CHAR_KEY_MAP);
            const configKey = typeof CHAR_TYPES !== 'undefined'
                ? charKeys[charImageIndex % charKeys.length]
                : Object.values(CHAR_KEY_MAP)[charImageIndex % Object.values(CHAR_KEY_MAP).length];
            charImageIndex++;
            const src = typeof charImages !== 'undefined' && charImages[configKey] && charImages[configKey].src;
            if (src) {
                const img = document.createElement('img');
                img.src = src;
                img.alt = configKey;
                el.appendChild(img);
            }
        } else {
            el.className = 'ln ln-normal';
            el.textContent = line.v;
        }
        inner.appendChild(el);
    });

    // 下部スペース
    const botPad = document.createElement('div');
    botPad.style.height = '60vh';
    inner.appendChild(botPad);

}

// =============================================
// スクロール制御
// =============================================
const SCROLL_SPEED = 55; // ピクセル/秒
let totalH = 0;
let scrollPos = 0;
let playing = false;
let animId = null;
let startT = null;

function startCredits() {
    // タイトル画面を非表示
    document.getElementById('titleScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';

    // スクロール距離を計算
    totalH = document.getElementById('scrollInner').scrollHeight - window.innerHeight;

    // UIの表示（遅延）
    setTimeout(() => {
        document.getElementById('controls').classList.add('show');
        document.getElementById('backBtn').style.opacity = '1';
    }, 2000);

    // スクロール開始（少し間を置く）
    setTimeout(() => {
        playing = true;
        startT = performance.now();
        animId = requestAnimationFrame(tick);
    }, 1500);
}

function tick(now) {
    if (!playing) return;
    const elapsed = (now - startT) / 1000;
    scrollPos = Math.min(elapsed * SCROLL_SPEED, totalH);

    document.getElementById('scrollInner').style.transform = `translateY(${-scrollPos}px)`;
    document.getElementById('progressFill').style.width = `${(scrollPos / totalH) * 100}%`;

    if (scrollPos < totalH) {
        animId = requestAnimationFrame(tick);
    } else {
        // スクロール完了
        playing = false;
        document.getElementById('pauseBtn').textContent = '▶';
    }
}

function togglePause() {
    if (playing) {
        playing = false;
        if (animId) cancelAnimationFrame(animId);
        document.getElementById('pauseBtn').textContent = '▶';
    } else {
        playing = true;
        // 現在位置から再開するための時刻を逆算
        startT = performance.now() - (scrollPos / SCROLL_SPEED) * 1000;
        animId = requestAnimationFrame(tick);
        document.getElementById('pauseBtn').textContent = '⏸';
    }
}

function resetCredits() {
    scrollPos = 0;
    playing = false;
    if (animId) cancelAnimationFrame(animId);
    document.getElementById('titleScreen').style.display = 'flex';
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('scrollInner').style.transform = 'translateY(0)';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('pauseBtn').textContent = '⏸';
    document.getElementById('backBtn').style.opacity = '0';
    document.getElementById('controls').classList.remove('show');
}

// 初期化実行
init();
</script>
