<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>座標エディタ - めいすいくん総選挙</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      background: #1a1a2e; color: #eee;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ── タブバー ── */
    .tabs {
      display: flex; background: #0d0d1a; border-bottom: 2px solid #333;
      flex-shrink: 0;
    }
    .tab {
      padding: 10px 22px; font-size: 15px; font-weight: 700; cursor: pointer;
      border: none; background: transparent; color: #888; transition: all 0.2s;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
    }
    .tab:hover { color: #ccc; background: rgba(255,255,255,0.05); }
    .tab.active-markers { color: #ffd700; border-color: #ffd700; background: rgba(255,215,0,0.08); }
    .tab.active-land    { color: #66ff66; border-color: #66ff66; background: rgba(100,255,100,0.08); }
    .tab.active-sea     { color: #44aaff; border-color: #44aaff; background: rgba(68,170,255,0.08); }

    /* ── 操作パネル ── */
    .panel {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; background: #111; border-bottom: 1px solid #2a2a3a;
      flex-wrap: wrap; flex-shrink: 0; min-height: 44px;
    }
    .panel button {
      padding: 4px 12px; border: none; border-radius: 5px;
      font-size: 12px; font-weight: 700; cursor: pointer; color: #fff;
    }
    .btn-save   { background: #4caf50; font-size: 13px !important; padding: 6px 18px !important; }
    .btn-load   { background: #2196f3; }
    .btn-clear  { background: #c62828; }
    .btn-reset  { background: #546e7a; }

    /* ゾーンパネル: 使い方カード */
    .zone-panel {
      padding: 8px 16px; background: #0a1a0a; border-bottom: 2px solid #2a4a2a;
      flex-shrink: 0; display: flex; align-items: center; gap: 20px;
    }
    .zone-panel.sea-panel { background: #0a0f1a; border-color: #1a2e4a; }

    .howto { display: flex; gap: 16px; font-size: 13px; }
    .howto-item { display: flex; align-items: center; gap: 5px; }
    .howto-item .icon { font-size: 16px; }

    .vtx-badge {
      font-size: 20px; font-weight: 900; padding: 4px 14px;
      border-radius: 20px; margin-left: auto;
    }
    .vtx-badge.land { background: rgba(100,255,100,0.2); color: #66ff66; border: 2px solid #66ff66; }
    .vtx-badge.sea  { background: rgba(68,170,255,0.2); color: #44aaff; border: 2px solid #44aaff; }

    /* マーカーパネル用グループボタン */
    .group-label { font-size: 11px; color: #666; margin-left: 6px; }
    .marker-btn {
      padding: 3px 8px; font-size: 11px; font-weight: 700;
      border: 2px solid transparent !important; border-radius: 4px; opacity: 0.6; cursor: pointer;
    }
    .marker-btn.active { opacity: 1; border-color: #fff !important; }

    /* ── キャンバスエリア ── */
    .canvas-wrap {
      flex: 1; overflow: auto; position: relative;
      background: #111; display: flex; justify-content: center;
    }
    canvas {
      cursor: crosshair; display: block;
      /* 画面幅に合わせて縮小（引き伸ばしはしない） */
      max-width: 100%; height: auto;
    }

    /* ── ステータスバー ── */
    .statusbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 3px 14px; background: #0d0d1a; border-top: 1px solid #333;
      font-size: 12px; font-family: monospace; flex-shrink: 0;
    }
    .statusbar .coords { color: #ffd700; }
    .statusbar .msg    { color: #4caf50; }

    #saveMsg {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(76,175,80,0.95); color: #fff;
      padding: 8px 20px; border-radius: 8px; font-size: 14px;
      display: none; z-index: 999;
    }
  </style>
</head>
<body>

  <!-- ① タブ -->
  <div class="tabs">
    <button class="tab active-markers" id="tab-markers" onclick="switchTab('markers')">📍 マーカー配置</button>
    <button class="tab" id="tab-land"    onclick="switchTab('land')">🌳 陸エリア設定</button>
    <button class="tab" id="tab-sea"     onclick="switchTab('sea')">🐟 海エリア設定</button>
    <div style="flex:1"></div>
    <button class="btn-save" style="margin:6px 8px;" onclick="saveAndApply()">💾 保存</button>
    <button class="btn-load" style="margin:6px 4px;" onclick="loadJSON()">📂 読込</button>
    <button class="btn-reset" style="margin:6px 8px 6px 4px;" onclick="resetAll()">↩ リセット</button>
  </div>

  <!-- ② マーカーパネル（マーカー配置タブ時のみ表示） -->
  <div class="panel" id="panel-markers">
    <span class="group-label">ビーナス:</span><div id="grp_meisui_chan"></div>
    <span class="group-label">海:</span><div id="grp_bekabune"></div>
    <span class="group-label">屋形船:</span><div id="grp_asari"></div>
    <span class="group-label">漁師:</span><div id="grp_ryoushi"></div>
    <span class="group-label">未来:</span><div id="grp_future"></div>
    <span class="group-label">駅:</span><div id="grp_station"></div>
    <span class="group-label">施設:</span><div id="grp_facility"></div>
    <span class="group-label">投票所:</span><div id="grp_vote"></div>
  </div>

  <!-- ③ 陸エリアパネル（陸タブ時のみ表示） -->
  <div class="zone-panel" id="panel-land" style="display:none;">
    <div>
      <div style="font-size:14px;font-weight:900;color:#66ff66;margin-bottom:4px;">🌳 陸エリア設定</div>
      <div style="font-size:11px;color:#aaa;">木・花・建物のランダム配置範囲</div>
    </div>
    <div class="howto">
      <div class="howto-item"><span class="icon">👆</span><span>クリック → 頂点を追加</span></div>
      <div class="howto-item"><span class="icon">✋</span><span>頂点をドラッグ → 移動</span></div>
      <div class="howto-item"><span class="icon">🖱️</span><span>頂点を右クリック → 削除</span></div>
    </div>
    <div class="vtx-badge land" id="badge-land">頂点 4個</div>
    <button class="btn-clear" onclick="clearZone('land')" style="margin-left:8px;">✕ 全削除</button>
  </div>

  <!-- ④ 海エリアパネル（海タブ時のみ表示） -->
  <div class="zone-panel sea-panel" id="panel-sea" style="display:none;">
    <div>
      <div style="font-size:14px;font-weight:900;color:#44aaff;margin-bottom:4px;">🐟 海エリア設定</div>
      <div style="font-size:11px;color:#aaa;">魚・あさり・のり・屋形船のランダム配置範囲</div>
    </div>
    <div class="howto">
      <div class="howto-item"><span class="icon">👆</span><span>クリック → 頂点を追加</span></div>
      <div class="howto-item"><span class="icon">✋</span><span>頂点をドラッグ → 移動</span></div>
      <div class="howto-item"><span class="icon">🖱️</span><span>頂点を右クリック → 削除</span></div>
    </div>
    <div class="vtx-badge sea" id="badge-sea">頂点 4個</div>
    <button class="btn-clear" onclick="clearZone('sea')" style="margin-left:8px;">✕ 全削除</button>
  </div>

  <!-- ⑤ キャンバス -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas"></canvas>
  </div>

  <!-- ⑥ ステータスバー -->
  <div class="statusbar">
    <span class="coords" id="coordsDisplay">x: 0, y: 0</span>
    <span id="modeHint" style="color:#888;">マーカーをドラッグして位置を調整 / 右クリックでリセット</span>
  </div>

  <div id="saveMsg"></div>
  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileLoad(event)">

<script>
  const MAP_W = 1920, MAP_H = 1080;
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = MAP_W;
  canvas.height = MAP_H;

  // ============================================
  // 現在のタブ
  // ============================================
  let currentTab = 'markers'; // 'markers' | 'land' | 'sea'

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-markers').className = 'tab' + (tab === 'markers' ? ' active-markers' : '');
    document.getElementById('tab-land').className    = 'tab' + (tab === 'land'    ? ' active-land'    : '');
    document.getElementById('tab-sea').className     = 'tab' + (tab === 'sea'     ? ' active-sea'     : '');
    document.getElementById('panel-markers').style.display = tab === 'markers' ? 'flex' : 'none';
    document.getElementById('panel-land').style.display    = tab === 'land'    ? 'flex' : 'none';
    document.getElementById('panel-sea').style.display     = tab === 'sea'     ? 'flex' : 'none';

    if (tab === 'markers') {
      document.getElementById('modeHint').textContent = 'マーカーをドラッグして位置を調整 / 右クリックでリセット';
    } else if (tab === 'land') {
      document.getElementById('modeHint').textContent = '🌳 陸エリア編集中 — マップをクリックして多角形の頂点を追加してください';
    } else {
      document.getElementById('modeHint').textContent = '🐟 海エリア編集中 — マップをクリックして多角形の頂点を追加してください';
    }
    updateBadges();
    draw();
  }

  function updateBadges() {
    document.getElementById('badge-land').textContent = `頂点 ${zones.land.length}個`;
    document.getElementById('badge-sea').textContent  = `頂点 ${zones.sea.length}個`;
  }

  function clearZone(key) {
    if (!confirm(`${key === 'land' ? '陸' : '海'}エリアの頂点を全て削除しますか？`)) return;
    zones[key] = [];
    updateBadges();
    draw();
  }

  // ============================================
  // マーカー定義
  // ============================================
  const markerDefs = [
    { id: 'lighthouse',         label: '灯台',         color: '#ffeb3b', group: 'meisui_chan', x: 1020, y: 1051 },
    { id: 'marina',             label: 'マリーナ',     color: '#00bcd4', group: 'meisui_chan', x: 1037, y: 839  },
    { id: 'whale',              label: 'クジラ',       color: '#42a5f5', group: 'bekabune',   x: 1000, y: 900  },
    { id: 'coral_1',            label: 'サンゴ1',      color: '#ff6b6b', group: 'bekabune',   x: 200,  y: 1050 },
    { id: 'coral_2',            label: 'サンゴ2',      color: '#ff69b4', group: 'bekabune',   x: 563,  y: 910  },
    { id: 'coral_3',            label: 'サンゴ3',      color: '#ffa500', group: 'bekabune',   x: 791,  y: 998  },
    { id: 'coral_4',            label: 'サンゴ4',      color: '#da70d6', group: 'bekabune',   x: 1221, y: 1013 },
    { id: 'coral_5',            label: 'サンゴ5',      color: '#ff6347', group: 'bekabune',   x: 1394, y: 907  },
    { id: 'coral_6',            label: 'サンゴ6',      color: '#e040fb', group: 'bekabune',   x: 1581, y: 779  },
    { id: 'coral_7',            label: 'サンゴ7',      color: '#ff4500', group: 'bekabune',   x: 1740, y: 701  },
    { id: 'firework_1',         label: '花火1',        color: '#ff4444', group: 'asari',      x: 1484, y: 835  },
    { id: 'firework_2',         label: '花火2',        color: '#ffd700', group: 'asari',      x: 1193, y: 840  },
    { id: 'firework_3',         label: '花火3',        color: '#ff69b4', group: 'asari',      x: 1517, y: 455  },
    { id: 'fish_market',        label: '魚市場',       color: '#ff9800', group: 'ryoushi',    x: 778,  y: 660  },
    { id: 'shopping_arcade',    label: '商店街',       color: '#e040fb', group: 'ryoushi',    x: 978,  y: 158  },
    { id: 'harbor',             label: '港施設',       color: '#66bb6a', group: 'ryoushi',    x: 1118, y: 813  },
    { id: 'kasai_bridge',       label: '葛西大橋',     color: '#E65100', group: 'future',     x: 875,  y: 336  },
    { id: 'kasai_bridge_start', label: '橋起点',       color: '#E65100', group: 'future',     x: 910,  y: 351  },
    { id: 'kasai_bridge_end',   label: '橋終点',       color: '#E65100', group: 'future',     x: 837,  y: 326  },
    { id: 'ropeway_label',      label: 'ロープウェイ', color: '#9C27B0', group: 'future',     x: 1051, y: 315  },
    { id: 'marine_city',        label: '海上都市',     color: '#00BCD4', group: 'future',     x: 938,  y: 988  },
    { id: 'lm_浦安駅',         label: '浦安駅',       color: '#795548', group: 'station',    x: 973,  y: 185  },
    { id: 'lm_新浦安駅',       label: '新浦安駅',     color: '#795548', group: 'station',    x: 1233, y: 483  },
    { id: 'lm_舞浜駅',         label: '舞浜駅',       color: '#795548', group: 'station',    x: 827,  y: 712  },
    { id: 'lm_中央公園',       label: '中央公園',     color: '#4caf50', group: 'facility',   x: 1126, y: 661  },
    { id: 'lm_高洲中央公園',   label: '高洲中央公園', color: '#4caf50', group: 'facility',   x: 1273, y: 725  },
    { id: 'lm_浦安市総合公園', label: '総合公園',     color: '#4caf50', group: 'facility',   x: 1450, y: 739  },
    { id: 'lm_三番瀬',         label: '三番瀬',       color: '#26c6da', group: 'facility',   x: 1538, y: 560  },
    { id: 'lm_元町エリア',     label: '元町エリア',   color: '#8d6e63', group: 'facility',   x: 924,  y: 194  },
    { id: 'lm_中町エリア',     label: '中町エリア',   color: '#8d6e63', group: 'facility',   x: 989,  y: 530  },
    { id: 'lm_新町エリア',     label: '新町エリア',   color: '#8d6e63', group: 'facility',   x: 1286, y: 529  },
    { id: 'lm_東京湾',         label: '東京湾',       color: '#1976d2', group: 'facility',   x: 454,  y: 981  },
    { id: 'lm_舞浜リゾート',   label: '舞浜リゾート', color: '#e91e63', group: 'facility',   x: 690,  y: 882  },
    { id: 'lm_国道沿い商店',   label: '国道沿い商店', color: '#ff9800', group: 'facility',   x: 1078, y: 462  },
    { id: 'lm_市役所',         label: '市役所',       color: '#f44336', group: 'vote',       x: 1081, y: 420  },
    { id: 'lm_中央公民館',     label: '中央公民館',   color: '#f44336', group: 'vote',       x: 957,  y: 237  },
    { id: 'lm_市民プラザ',     label: '市民プラザ',   color: '#f44336', group: 'vote',       x: 1247, y: 516  },
    { id: 'lm_日の出公民館',   label: '日の出公民館', color: '#f44336', group: 'vote',       x: 1393, y: 580  },
    { id: 'lm_高洲公民館',     label: '高洲公民館',   color: '#f44336', group: 'vote',       x: 1329, y: 732  },
    { id: 'lm_富岡公民館',     label: '富岡公民館',   color: '#f44336', group: 'vote',       x: 1074, y: 619  },
  ];

  // ============================================
  // ゾーンポリゴン
  // ============================================
  let zones = {
    land: [ {x:680,y:60}, {x:1750,y:60}, {x:1750,y:850}, {x:680,y:850} ],
    sea:  [ {x:620,y:600}, {x:1920,y:600}, {x:1920,y:1080}, {x:620,y:1080} ]
  };

  // ============================================
  // マーカー状態
  // ============================================
  let markers = markerDefs.map(d => ({ ...d }));
  let selectedId = null;
  let dragging = null;
  let dragOffset = { x: 0, y: 0 };
  let draggingVertex = null;
  let hasDragged = false;
  let zoneMouseDownKey = null;

  // ============================================
  // マップ画像
  // ============================================
  const mapImg = new Image();
  mapImg.onload = () => { loadSaved(); draw(); };
  mapImg.onerror = () => { loadSaved(); draw(); }; // 画像なくても動く
  mapImg.src = 'map_real.png';
  // キャッシュ済みの場合 onload が発火しないブラウザ対策
  if (mapImg.complete) { loadSaved(); draw(); }

  // ============================================
  // マーカーボタン生成
  // ============================================
  ['meisui_chan','bekabune','asari','ryoushi','future','station','facility','vote'].forEach(grp => {
    const cont = document.getElementById('grp_' + grp);
    if (!cont) return;
    markerDefs.filter(d => d.group === grp).forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'marker-btn';
      btn.textContent = d.label;
      btn.style.background = d.color;
      btn.style.color = ['#ffeb3b','#ffa500','#E65100'].includes(d.color) ? '#333' : '#fff';
      btn.id = 'btn-' + d.id;
      btn.onclick = () => {
        selectedId = (selectedId === d.id) ? null : d.id;
        updateMarkerBtns();
        draw();
      };
      cont.appendChild(btn);
    });
  });

  function updateMarkerBtns() {
    markerDefs.forEach(d => {
      const b = document.getElementById('btn-' + d.id);
      if (b) b.classList.toggle('active', selectedId === d.id);
    });
  }

  // ============================================
  // 描画
  // ============================================
  function drawPolygon(pts, rgb, isActive) {
    if (pts.length === 0) return;
    ctx.save();

    // 塗り
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.fillStyle = `rgba(${rgb}, ${isActive ? 0.20 : 0.06})`;
    ctx.fill();

    // 枠線
    ctx.strokeStyle = `rgba(${rgb}, ${isActive ? 1.0 : 0.35})`;
    ctx.lineWidth = isActive ? 3 : 1.5;
    ctx.setLineDash(isActive ? [] : [12, 6]);
    ctx.stroke();
    ctx.setLineDash([]);

    // 頂点の丸
    pts.forEach((p, i) => {
      const r = isActive ? 10 : 5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle = isActive ? `rgba(${rgb}, 1)` : `rgba(${rgb}, 0.4)`;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      if (isActive) {
        ctx.font = 'bold 12px sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(i + 1, p.x, p.y);
        ctx.textBaseline = 'alphabetic';
      }
    });

    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, MAP_W, MAP_H);
    if (mapImg.complete && mapImg.naturalWidth > 0) ctx.drawImage(mapImg, 0, 0, MAP_W, MAP_H);

    // ゾーン描画
    drawPolygon(zones.land, '100,230,100', currentTab === 'land');
    drawPolygon(zones.sea,  '68,170,255',  currentTab === 'sea');

    // マーカー描画
    const fade = currentTab !== 'markers' ? 0.25 : 1.0;
    markers.forEach(m => {
      const sel = m.id === selectedId;
      const r = sel ? 15 : 9;
      ctx.globalAlpha = sel ? 1.0 : fade * 0.8;
      ctx.beginPath();
      ctx.arc(m.x, m.y, r, 0, Math.PI * 2);
      ctx.fillStyle = m.color;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = sel ? 3 : 1.5;
      ctx.stroke();
      if (sel) {
        ctx.globalAlpha = 1;
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeText(m.label, m.x, m.y - r - 6);
        ctx.fillText(m.label, m.x, m.y - r - 6);
        ctx.font = '10px monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.strokeText(`(${Math.round(m.x)}, ${Math.round(m.y)})`, m.x, m.y + r + 13);
        ctx.fillText(`(${Math.round(m.x)}, ${Math.round(m.y)})`, m.x, m.y + r + 13);
      }
      ctx.globalAlpha = 1;
    });
  }

  // ============================================
  // 座標変換
  // ============================================
  function getMapCoords(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (MAP_W / rect.width),
      y: (e.clientY - rect.top)  * (MAP_H / rect.height)
    };
  }

  function findMarkerAt(mx, my) {
    for (let i = markers.length - 1; i >= 0; i--) {
      const m = markers[i];
      if ((m.x-mx)**2 + (m.y-my)**2 < 400) return m;
    }
    return null;
  }

  function findVertexAt(mx, my, key) {
    const pts = zones[key];
    // スクリーン上で 16px 相当のヒット半径
    const rect = canvas.getBoundingClientRect();
    const hitR = 16 * (MAP_W / rect.width);
    for (let i = pts.length - 1; i >= 0; i--) {
      if ((pts[i].x-mx)**2 + (pts[i].y-my)**2 < hitR*hitR) return i;
    }
    return -1;
  }

  // ============================================
  // マウスイベント
  // ============================================
  canvas.addEventListener('mousedown', e => {
    hasDragged = false;
    const { x, y } = getMapCoords(e);

    if (currentTab === 'markers') {
      if (e.button === 2) {
        const hit = findMarkerAt(x, y);
        if (hit) { const d = markerDefs.find(d=>d.id===hit.id); if(d){hit.x=d.x;hit.y=d.y;draw();} }
        return;
      }
      const hit = findMarkerAt(x, y);
      if (hit) {
        dragging = hit;
        dragOffset = { x: hit.x - x, y: hit.y - y };
        selectedId = hit.id;
        updateMarkerBtns();
        draw();
      }
    } else {
      // ゾーンタブ
      const key = currentTab; // 'land' または 'sea'
      zoneMouseDownKey = key;

      if (e.button === 2) {
        // 右クリック → 頂点削除
        const vi = findVertexAt(x, y, key);
        if (vi >= 0) { zones[key].splice(vi, 1); updateBadges(); draw(); }
        return;
      }
      // 左クリック: 既存頂点の上ならドラッグ準備
      const vi = findVertexAt(x, y, key);
      if (vi >= 0) draggingVertex = { key, index: vi };
      // そうでなければ mouseup で頂点追加
    }
  });

  canvas.addEventListener('mousemove', e => {
    const { x, y } = getMapCoords(e);
    document.getElementById('coordsDisplay').textContent = `x: ${Math.round(x)}, y: ${Math.round(y)}`;

    if (dragging) {
      hasDragged = true;
      dragging.x = Math.round(x + dragOffset.x);
      dragging.y = Math.round(y + dragOffset.y);
      draw();
    } else if (draggingVertex) {
      hasDragged = true;
      zones[draggingVertex.key][draggingVertex.index] = { x: Math.round(x), y: Math.round(y) };
      draw();
    }
  });

  canvas.addEventListener('mouseup', e => {
    // ゾーンタブで左クリック（ドラッグなし）→ 頂点追加
    if (e.button === 0 && !hasDragged && zoneMouseDownKey) {
      const { x, y } = getMapCoords(e);
      zones[zoneMouseDownKey].push({ x: Math.round(x), y: Math.round(y) });
      updateBadges();
      draw();
    }
    dragging = null;
    draggingVertex = null;
    zoneMouseDownKey = null;
    hasDragged = false;
  });

  canvas.addEventListener('mouseleave', () => {
    dragging = null;
    draggingVertex = null;
    zoneMouseDownKey = null;
    hasDragged = false;
  });

  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ============================================
  // 保存・読込
  // ============================================
  function saveAndApply() {
    const data = {};
    markers.forEach(m => { data[m.id] = { x: Math.round(m.x), y: Math.round(m.y) }; });
    data.zone_land = zones.land.map(p => ({ x: Math.round(p.x), y: Math.round(p.y) }));
    data.zone_sea  = zones.sea.map(p  => ({ x: Math.round(p.x), y: Math.round(p.y) }));
    const json = JSON.stringify(data, null, 2);

    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'fixed-positions.json';
    a.click();

    localStorage.setItem('meisui_fixed_positions', json);
    showMsg('保存しました！ fixed-positions.json をプロジェクトフォルダに上書きしてください');
  }

  function loadSaved() {
    const saved = localStorage.getItem('meisui_fixed_positions');
    if (saved) {
      try { applyData(JSON.parse(saved)); } catch(e) {}
    } else {
      fetch('fixed-positions.json').then(r => r.json()).then(data => {
        applyData(data); draw();
      }).catch(() => {});
    }
  }

  function applyData(data) {
    markers.forEach(m => { if (data[m.id]) { m.x = data[m.id].x; m.y = data[m.id].y; } });
    if (Array.isArray(data.zone_land) && data.zone_land.length > 0)
      zones.land = data.zone_land.map(p => ({ x: p.x, y: p.y }));
    if (Array.isArray(data.zone_sea) && data.zone_sea.length > 0)
      zones.sea = data.zone_sea.map(p => ({ x: p.x, y: p.y }));
    updateBadges();
  }

  function loadJSON() { document.getElementById('fileInput').click(); }
  function handleFileLoad(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try { applyData(JSON.parse(ev.target.result)); draw(); showMsg('読み込みました'); }
      catch(err) { alert('読み込み失敗: ' + err.message); }
    };
    r.readAsText(file);
  }

  function resetAll() {
    if (!confirm('全マーカーとゾーンを初期位置に戻しますか？')) return;
    markers = markerDefs.map(d => ({ ...d }));
    zones = {
      land: [ {x:680,y:60},{x:1750,y:60},{x:1750,y:850},{x:680,y:850} ],
      sea:  [ {x:620,y:600},{x:1920,y:600},{x:1920,y:1080},{x:620,y:1080} ]
    };
    localStorage.removeItem('meisui_fixed_positions');
    updateBadges();
    draw();
  }

  function showMsg(msg) {
    const el = document.getElementById('saveMsg');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3500);
  }
</script>
</body>
